<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Notes</title>

<!-- Syntax highlighting theme -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<!-- App stylesheet -->
<link rel="stylesheet" href="styles.css">

<!-- Third-party libraries -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body class="view-home">

<div id="app">
  <div id="sidebar-overlay"></div>

  <aside id="sidebar">
    <div class="sidebar-top">
      <a href="#/" class="home-link">&larr; Home</a>
      <h2 id="sidebar-title"></h2>
    </div>
    <div id="search-box"><input type="text" placeholder="Search files..." id="search-input"></div>
    <a id="compiler-btn" href="" target="_blank" rel="noopener"></a>
    <div id="file-tree"></div>
  </aside>

  <main id="main">
    <div id="topbar">
      <button id="menu-btn" aria-label="Toggle sidebar">&#9776;</button>
      <div id="breadcrumb"></div>
      <span id="progress-text"></span>
    </div>

    <div id="home-view">
      <div class="home-content">
        <h1>Study Notes</h1>
        <p class="subtitle">Choose a subject to start studying</p>
        <div class="subject-grid" id="subject-grid"></div>
      </div>
    </div>

    <div id="reader-view">
      <div id="content-area">
        <div id="content">
          <div id="welcome">
            <h1>Study Notes</h1>
            <p>Pick a file from the sidebar to start reading.</p>
          </div>
        </div>
        <div id="toc">
          <h3>On this page</h3>
          <div id="toc-links"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<a id="try-it-float" href="" target="_blank" rel="noopener"></a>

<!-- App logic -->
<script src="app.js"></script>

</body>
</html>
